name: ci

on: push

jobs:
    ci:
        runs-on: ${{ matrix.os }}

        strategy:
            matrix:
                os: [ubuntu-latest]
                bun: [1.1.38]

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ matrix.bun }}

            - name: Install dependencies
              run: bun install

            - name: Lint
              run: bun run lint

            - name: Typecheck
              run: bun run typecheck
